<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Browser performance baseline</title>
    <style>
      #results {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 2;
        display: none;
      }
    </style>
  </head>
  <body>
    <pre id="results">Running browser baseline...</pre>
    <script type="module">
      import { createComparisonSections } from '../src/comparison/comparisonModel.js';
      import {
        serializeSectionForCopy,
        serializeSectionsForExport,
        serializeSectionsForJsonExport,
      } from '../src/clipboard/serializeSection.js';
      import { getVisibleSectionForCopy } from '../src/clipboard/visibleSection.js';
      import { parseInput } from '../src/parsers/index.js';
      import { createExactMatchTargets } from '../src/search/exactMatch.js';
      import { filterSectionsByQuery } from '../src/search/filterSections.js';
      import { getCoreAnalyticsView } from '../src/ui/coreAnalyticsView.js';
      import { renderSections } from '../src/ui/renderApp.js';
      import { renderSectionNav } from '../src/ui/renderSectionNav.js';
      import { createLargeCoreAnalyticsFixture, createLargeStackshotFixture } from './fixtures/largeReportWorkloads.js';

      const resultsElement = document.querySelector('#results');
      const errors = [];
      const settleMode = document.visibilityState === 'hidden' ? 'setTimeout(0) hidden-document fallback' : 'requestAnimationFrame';
      window.addEventListener('error', (event) => errors.push(event.message));
      window.addEventListener('unhandledrejection', (event) => errors.push(String(event.reason)));

      function nextFrame() {
        const timeoutFallback = new Promise((resolve) => setTimeout(resolve, 50));
        if (document.visibilityState === 'hidden') {
          return new Promise((resolve) => setTimeout(resolve, 0));
        }
        return Promise.race([
          new Promise((resolve) => requestAnimationFrame(resolve)),
          timeoutFallback,
        ]);
      }

      function summarizeSamples(samples) {
        const sorted = [...samples].sort((left, right) => left - right);
        return {
          cycles: samples.length,
          minMs: sorted[0],
          medianMs: sorted[Math.floor(sorted.length / 2)],
          p95Ms: sorted[Math.max(0, Math.ceil(sorted.length * 0.95) - 1)],
          maxMs: sorted.at(-1),
        };
      }

      async function measureAsync(operation, iterations = 10) {
        for (let index = 0; index < 3; index += 1) {
          operation();
          await nextFrame();
        }

        const samples = [];
        for (let index = 0; index < iterations; index += 1) {
          const started = performance.now();
          operation();
          await nextFrame();
          samples.push(performance.now() - started);
        }
        return summarizeSamples(samples);
      }

      function renderParsedSections(sections, {
        allSections = sections,
        searchActive = false,
        matchRegions = [],
        activeExactMatchId = '',
      } = {}) {
        const sectionRoot = document.querySelector('#sections');
        const navRoot = document.querySelector('#section-nav');
        const coreAnalyticsView = getCoreAnalyticsView(sections);
        renderSectionNav(navRoot, sections);
        renderSections(sectionRoot, sections, {
          allSections,
          coreAnalyticsView,
          searchActive,
          matchRegions,
          activeExactMatchId,
          onCopySection: () => Promise.resolve({ ok: true }),
        });
      }

      function clearRenderedState() {
        document.querySelector('#sections').replaceChildren();
        document.querySelector('#section-nav').replaceChildren();
      }

      function accessibilityReport() {
        const controls = [...document.querySelectorAll('button, input, textarea, a')];
        const unavailableControls = controls.filter((control) =>
          control.closest('details:not([open]), dialog:not([open]), [hidden]')
        );
        const unnamed = controls
          .filter((control) => {
            const label = control.getAttribute('aria-label') || control.getAttribute('aria-labelledby');
            const associatedLabel = control.id && document.querySelector(`label[for="${control.id}"]`);
            const wrappingLabel = control.closest('label');
            return !label && !associatedLabel && !wrappingLabel && !control.textContent.trim() && !control.getAttribute('title');
          })
          .map((control) => control.id || control.tagName.toLowerCase());
        const focusFailures = controls
          .filter((control) => !unavailableControls.includes(control) && !control.disabled && control.getClientRects().length > 0)
          .filter((control) => {
            control.focus();
            return document.activeElement !== control;
          })
          .map((control) => control.id || control.tagName.toLowerCase());
        const hiddenFocusLeaks = unavailableControls
          .filter((control) => !control.disabled)
          .filter((control) => {
            control.focus();
            return document.activeElement === control;
          })
          .map((control) => control.id || control.tagName.toLowerCase());

        return {
          controlCount: controls.length,
          unnamedControls: unnamed,
          focusFailures,
          hiddenFocusLeaks,
          exportControls: ['download-visible-export', 'download-visible-json'].map((id) => ({
            id,
            present: Boolean(document.querySelector(`#${id}`)),
          })),
        };
      }

      function containmentReport() {
        return {
          viewportWidth: window.innerWidth,
          documentScrollWidth: document.documentElement.scrollWidth,
          bodyScrollWidth: document.body.scrollWidth,
          sectionScrollWidth: document.querySelector('#sections').scrollWidth,
          pageOverflow: document.documentElement.scrollWidth > window.innerWidth,
        };
      }

      async function loadAppMarkup() {
        const source = await fetch('../index.html').then((response) => response.text());
        const template = new DOMParser().parseFromString(source, 'text/html');
        template.body.querySelectorAll('script').forEach((script) => script.remove());
        const resultPlaceholder = resultsElement;
        document.body.replaceChildren(...template.body.childNodes, resultPlaceholder);
        const stylesheet = document.createElement('link');
        stylesheet.rel = 'stylesheet';
        stylesheet.href = '../styles/main.css';
        document.head.append(stylesheet);
      }

      async function benchmarkReport(text, query, parserType) {
        let sections;
        const parseToRender = await measureAsync(() => {
          sections = parseInput(text);
          renderParsedSections(sections);
        });

        const search = await measureAsync(() => {
          const filtered = filterSectionsByQuery(sections, query);
          const targets = createExactMatchTargets(filtered.matchRegions);
          renderParsedSections(filtered.sections, {
            allSections: sections,
            searchActive: true,
            matchRegions: filtered.matchRegions,
            activeExactMatchId: targets[0]?.id ?? '',
          });
        });

        const noResultsSearch = await measureAsync(() => {
          const filtered = filterSectionsByQuery(sections, 'NO-SUCH-SYNTHETIC-TERM');
          renderParsedSections(filtered.sections, {
            allSections: sections,
            searchActive: true,
            matchRegions: filtered.matchRegions,
          });
        });

        const clearSearch = await measureAsync(() => renderParsedSections(sections));
        const comparisonEntry = {
          classification: { parserType, supported: true },
          sections,
        };
        const comparisonEntries = [comparisonEntry, comparisonEntry, comparisonEntry];
        let comparisonSections;
        const comparison = await measureAsync(() => {
          comparisonSections = createComparisonSections(comparisonEntries);
          const filtered = filterSectionsByQuery(comparisonSections, query);
          const targets = createExactMatchTargets(filtered.matchRegions);
          renderParsedSections(filtered.sections, {
            allSections: comparisonSections,
            searchActive: true,
            matchRegions: filtered.matchRegions,
            activeExactMatchId: targets[0]?.id ?? '',
          });
        });
        const clearComparison = await measureAsync(() => {
          clearRenderedState();
          renderParsedSections(sections);
        });
        const clearReport = await measureAsync(() => clearRenderedState());

        return {
          parseToRender,
          search,
          noResultsSearch,
          clearSearch,
          comparison,
          clearComparison,
          clearReport,
          sectionCount: sections.length,
          renderedRows: sections.reduce((total, section) => total + (section.table?.length ?? 0), 0),
        };
      }

      async function repeatedWorkflow(text, query, cycles = 20) {
        const samples = [];
        for (let index = 0; index < cycles; index += 1) {
          const started = performance.now();
          const sections = parseInput(text);
          renderParsedSections(sections);
          await nextFrame();
          const filtered = filterSectionsByQuery(sections, query);
          const targets = createExactMatchTargets(filtered.matchRegions);
          renderParsedSections(filtered.sections, {
            allSections: sections,
            searchActive: true,
            matchRegions: filtered.matchRegions,
            activeExactMatchId: targets[0]?.id ?? '',
          });
          await nextFrame();
          renderParsedSections(sections);
          await nextFrame();
          const entry = { classification: { parserType: 'coreanalytics', supported: true }, sections };
          const comparisonSections = createComparisonSections([entry, entry]);
          const comparisonFiltered = filterSectionsByQuery(comparisonSections, query);
          const comparisonTargets = createExactMatchTargets(comparisonFiltered.matchRegions);
          renderParsedSections(comparisonFiltered.sections, {
            allSections: comparisonSections,
            searchActive: true,
            matchRegions: comparisonFiltered.matchRegions,
            activeExactMatchId: comparisonTargets[0]?.id ?? '',
          });
          await nextFrame();
          clearRenderedState();
          await nextFrame();
          samples.push(performance.now() - started);
        }
        await nextFrame();
        return summarizeSamples(samples);
      }

      async function exactMatchRenderingWorkflow() {
        const sections = [{
          id: 'exact-match-harness',
          title: 'Needle title',
          priority: 'normal',
          fields: [{ label: 'Needle label', value: 'Needle value 😀' }],
          tableColumns: [{ key: 'value', label: 'Needle header' }],
          table: [{ value: 'Needle cell' }],
          chart: {
            type: 'memory',
            title: 'Needle chart',
            items: [{ label: 'Needle chart label', value: 17, color: '#30d158' }],
          },
          raw: 'Needle text',
        }];
        const filtered = filterSectionsByQuery(sections, 'needle');
        const targets = createExactMatchTargets(filtered.matchRegions);
        renderParsedSections(filtered.sections, {
          allSections: sections,
          searchActive: true,
          matchRegions: filtered.matchRegions,
          activeExactMatchId: targets[0]?.id ?? '',
        });
        await nextFrame();

        const marks = [...document.querySelectorAll('#sections mark.exact-match')];
        const activeMarks = marks.filter((mark) => mark.classList.contains('exact-match--active'));
        const kinds = [...new Set(marks.map((mark) => mark.dataset.exactMatchKind))].sort();
        const targetIds = marks.map((mark) => mark.dataset.exactMatchId);
        const chartValueFiltered = filterSectionsByQuery(sections, '17');
        const chartValueTargets = createExactMatchTargets(chartValueFiltered.matchRegions);
        renderParsedSections(chartValueFiltered.sections, {
          allSections: sections,
          searchActive: true,
          matchRegions: chartValueFiltered.matchRegions,
          activeExactMatchId: chartValueTargets[0]?.id ?? '',
        });
        await nextFrame();
        const hostileSection = [{
          ...sections[0],
          id: 'hostile-exact-match-harness',
          title: '<img src=x onerror=alert(1)> Needle',
        }];
        const hostileFiltered = filterSectionsByQuery(hostileSection, 'needle');
        renderParsedSections(hostileFiltered.sections, {
          allSections: hostileSection,
          searchActive: true,
          matchRegions: hostileFiltered.matchRegions,
          activeExactMatchId: createExactMatchTargets(hostileFiltered.matchRegions)[0]?.id ?? '',
        });
        await nextFrame();

        return {
          targetCount: targets.length,
          renderedMarkCount: marks.length,
          activeMarkCount: activeMarks.length,
          renderedKinds: kinds,
          targetIdsUnique: new Set(targetIds).size === targetIds.length,
          chartValueTargetCount: chartValueTargets.filter((target) => target.kind === 'chart-value').length,
          chartValueCanvasCount: document.querySelectorAll('#sections canvas').length,
          hostileImageCount: document.querySelectorAll('#sections img').length,
          hostileTextPreserved: document.querySelector('#sections h2')?.textContent.includes('<img src=x onerror=alert(1)>') === true,
        };
      }

      function visibleSearchContractWorkflow() {
        const hiddenValue = ['hidden', 'workflow', 'value'].join('-');
        const sections = [{
          id: 'visible-search-contract',
          title: 'Workflow table',
          priority: 'normal',
          tableColumns: [{ key: 'visible', label: 'Visible value' }],
          table: [{ visible: 'Visible workflow cell repeat repeat', helper: hiddenValue }],
        }];
        const transitions = [
          ['empty', ''],
          ['visible-cell', 'visible workflow cell'],
          ['hidden-only', hiddenValue],
          ['no-result', 'no such workflow value'],
          ['repeated-occurrence', 'repeat'],
          ['cleared', ''],
        ].map(([state, query]) => {
          const filtered = filterSectionsByQuery(sections, query);
          const targets = createExactMatchTargets(filtered.matchRegions);
          renderParsedSections(filtered.sections, {
            allSections: sections,
            searchActive: filtered.active,
            matchRegions: filtered.matchRegions,
            activeExactMatchId: targets[0]?.id ?? '',
          });
          const visibleSections = filtered.sections.map((section) =>
            getVisibleSectionForCopy(section, { allSections: sections })
          );
          const copy = visibleSections.map(serializeSectionForCopy).join('\n');
          const textExport = serializeSectionsForExport(visibleSections);
          const jsonExport = serializeSectionsForJsonExport(visibleSections);
          const renderedRoots = [document.querySelector('#sections'), document.querySelector('#section-nav')];
          const renderedSurface = renderedRoots.flatMap((root) => [
            root.textContent,
            ...[...root.querySelectorAll('*')].flatMap((element) => [...element.attributes].map((attribute) => attribute.value)),
          ]).join(' ');

          return {
            state,
            active: filtered.active,
            sectionCount: filtered.sections.length,
            rowCount: filtered.sections.flatMap((section) => section.table ?? []).length,
            matchCount: filtered.totalMatches,
            navigationCount: filtered.navigationTargets.length,
            targetCount: targets.length,
            renderedNavigationCount: document.querySelectorAll('#section-nav a').length,
            renderedMarkCount: document.querySelectorAll('#sections mark.exact-match').length,
            copyEligible: Boolean(copy),
            textExportEligible: Boolean(textExport),
            jsonSectionCount: JSON.parse(jsonExport).sections.length,
            hiddenValueExposed: `${renderedSurface}\n${copy}\n${textExport}\n${jsonExport}`.includes(hiddenValue),
          };
        });

        return { transitions };
      }

      async function applicationWorkflow(coreText) {
        await import('../src/main.js');
        const visibleQuery = 'demo.';
        const pasteInput = document.querySelector('#paste-input');
        const searchInput = document.querySelector('#result-search');
        const setSearch = async (query) => {
          searchInput.value = query;
          searchInput.dispatchEvent(new Event('input', { bubbles: true }));
          await new Promise((resolve) => setTimeout(resolve, 220));
          await nextFrame();
        };
        const state = () => ({
          searchValue: searchInput.value,
          resultStatus: document.querySelector('#status').textContent,
          searchStatus: document.querySelector('#search-count').textContent,
          exactStatus: document.querySelector('#exact-match-status').textContent,
          exactPosition: document.querySelector('#exact-match-position').textContent,
          exactPreviousDisabled: document.querySelector('#exact-match-previous').disabled,
          exactNextDisabled: document.querySelector('#exact-match-next').disabled,
          sectionCount: document.querySelectorAll('#sections > article').length,
          sectionNavigationCount: document.querySelectorAll('#section-nav a').length,
          searchNavigationHidden: document.querySelector('#search-navigation').hidden,
          exactNavigationHidden: document.querySelector('#exact-match-navigation').hidden,
          renderedMarkCount: document.querySelectorAll('#sections mark.exact-match').length,
          textExportDisabled: document.querySelector('#download-visible-export').disabled,
          jsonExportDisabled: document.querySelector('#download-visible-json').disabled,
          desktopNavigationHidden: document.querySelector('#section-nav').hidden,
          sectionsTriggerHidden: document.querySelector('#sections-trigger').hidden,
          sectionDialogOpen: document.querySelector('#section-dialog').open,
          duplicateIdCount: [...document.querySelectorAll('[id]')]
            .filter((element, index, elements) => elements.findIndex((candidate) => candidate.id === element.id) !== index)
            .length,
        });

        pasteInput.value = coreText;
        document.querySelector('#parse-paste').click();
        await nextFrame();
        const workspaceFocusMoved = document.activeElement === document.querySelector('#workspace-heading');
        const sectionsTrigger = document.querySelector('#sections-trigger');
        const sectionDialog = document.querySelector('#section-dialog');
        const mobileNavigation = { availableAtViewport: !sectionsTrigger.hidden };
        if (!sectionsTrigger.hidden) {
          sectionsTrigger.focus();
          sectionsTrigger.click();
          await nextFrame();
          mobileNavigation.open = sectionDialog.open;
          mobileNavigation.modal = sectionDialog.matches(':modal');
          mobileNavigation.entryFocus = document.activeElement?.closest('#mobile-section-nav') === document.querySelector('#mobile-section-nav');

          document.querySelector('#section-dialog-close').click();
          await nextFrame();
          mobileNavigation.explicitClose = !sectionDialog.open;
          mobileNavigation.focusReturned = document.activeElement === sectionsTrigger;

          sectionsTrigger.click();
          await nextFrame();
          document.querySelector('#mobile-section-nav .section-nav__link').click();
          await nextFrame();
          mobileNavigation.selectionClosed = !sectionDialog.open;
          mobileNavigation.selectionFocusedSection = document.activeElement?.closest('#sections > article') !== null;
          mobileNavigation.currentStateCount = document.querySelectorAll('.section-nav__link[aria-current="location"]').length;

          sectionsTrigger.click();
          document.querySelector('#parse-paste').click();
          await nextFrame();
          mobileNavigation.replacementClosed = !sectionDialog.open;
        }
        await setSearch(visibleQuery);
        const visibleSearch = state();
        const exactNext = document.querySelector('#exact-match-next');
        exactNext.focus();
        exactNext.click();
        await nextFrame();
        const nextFocusRetained = document.activeElement === exactNext;

        const clearSearch = document.querySelector('#clear-search');
        clearSearch.focus();
        clearSearch.click();
        await nextFrame();
        const clearedSearch = state();
        const clearFocusReturned = document.activeElement === searchInput;

        await setSearch(visibleQuery);
        document.querySelector('#privacy-toggle').click();
        await nextFrame();
        const rawLocalView = state();
        document.querySelector('#privacy-toggle').click();
        await nextFrame();
        const sanitizedReturn = state();

        document.querySelector('#parse-paste').click();
        await nextFrame();
        const reportTransition = state();

        document.querySelector('#add-to-comparison').click();
        await nextFrame();
        const localAlias = ['local', 'workflow', 'alias'].join('-');
        const localLabelInput = document.querySelector('#comparison-local-label-1');
        localLabelInput.value = localAlias;
        localLabelInput.dispatchEvent(new Event('input', { bubbles: true }));
        document.querySelector('#add-to-comparison').click();
        await nextFrame();
        document.querySelector('#compare-reports').click();
        await nextFrame();
        await setSearch(localAlias);
        const comparisonAliasSearch = state();
        const aliasInResults = document.querySelector('#sections').textContent.includes(localAlias);
        await setSearch('Report 1');
        const comparisonVisibleSearch = state();
        document.querySelector('#clear-comparison').click();
        await nextFrame();
        const comparisonCleared = state();

        if (!document.querySelector('#sections-trigger').hidden) document.querySelector('#sections-trigger').click();
        document.querySelector('#clear-report').click();
        await nextFrame();
        const reportCleared = state();
        const clearReturnedToImport = document.activeElement === document.querySelector('#file-input');

        return {
          workspaceFocusMoved,
          mobileNavigation,
          visibleSearch,
          nextFocusRetained,
          clearedSearch,
          clearFocusReturned,
          rawLocalView,
          sanitizedReturn,
          reportTransition,
          comparisonAliasSearch,
          aliasInResults,
          comparisonVisibleSearch,
          comparisonCleared,
          reportCleared,
          clearReturnedToImport,
        };
      }

      async function run() {
        await loadAppMarkup();
        await nextFrame();
        const coreText = createLargeCoreAnalyticsFixture();
        const stackshotText = createLargeStackshotFixture();
        const workflowText = await fetch('../examples/coreanalytics.ips.ca.synced').then((response) => response.text());
        const appWorkflow = await applicationWorkflow(workflowText);
        const core = await benchmarkReport(coreText, 'SyntheticMetricGroup-000', 'coreanalytics');
        const stackshot = await benchmarkReport(stackshotText, 'SyntheticStackProcess', 'resource-stackshot');
        const repeated = await repeatedWorkflow(coreText, 'SyntheticMetricGroup-000');
        const exactMatchRendering = await exactMatchRenderingWorkflow();
        const visibleSearchContract = visibleSearchContractWorkflow();
        let serviceWorkerReady = false;
        if ('serviceWorker' in navigator) {
          try {
            await navigator.serviceWorker.register('../service-worker.js');
            await navigator.serviceWorker.ready;
            serviceWorkerReady = true;
          } catch (error) {
            errors.push(`service worker: ${error.message}`);
          }
        }

        resultsElement.textContent = JSON.stringify({
          browser: navigator.userAgent,
          viewport: { width: window.innerWidth, height: window.innerHeight },
          settleMode,
          workloads: {
            coreAnalytics: { bytes: new TextEncoder().encode(coreText).length, records: 5000 },
            stackshot: { bytes: new TextEncoder().encode(stackshotText).length, processes: 5000 },
          },
          core,
          stackshot,
          repeatedWorkflow: repeated,
          applicationWorkflow: appWorkflow,
          exactMatchRendering,
          visibleSearchContract,
          accessibility: accessibilityReport(),
          containment: containmentReport(),
          pwa: {
            serviceWorkerApiAvailable: serviceWorkerReady,
            offlineReload: 'not measured; network interception is unavailable',
            heapSnapshots: 'not measured; browser heap tooling is unavailable',
          },
          errors,
        }, null, 2);
        document.title = 'Browser performance baseline complete';
      }

      run().catch((error) => {
        resultsElement.textContent = JSON.stringify({ error: error.message, errors }, null, 2);
        document.title = 'Browser performance baseline failed';
      });
    </script>
  </body>
</html>
